# Конфигурация экспериментов Fashion Object Detection.
# Значения помечены как предварительные и уточняются по результатам EDA и экспериментов.

# --- Пути ---
paths:
  raw_data: data/raw           # исходные данные (загруженный датасет)
  processed_data: data/processed  # обработанные данные
  results: results             # графики и логи
  plots: results/plots
  logs: results/logs

# --- Датасет ---
dataset:
  name: detection-datasets/fashionpedia  # имя датасета на Hugging Face
  # Отобранные категории (11 наиболее представленных самостоятельных предметов
  # одежды и аксессуаров), зафиксированы по результатам EDA. Задаются ИМЕНАМИ:
  # исходные category_id восстанавливаются программно через get_category_names,
  # а ПОРЯДОК в этом списке задаёт новые последовательные id (0-10).
  categories:
    - shoe                       # новый id 0 (исходный 23)
    - dress                      # новый id 1 (исходный 10)
    - "top, t-shirt, sweatshirt" # новый id 2 (исходный 1)
    - pants                      # новый id 3 (исходный 6)
    - jacket                     # новый id 4 (исходный 4)
    - "bag, wallet"              # новый id 5 (исходный 24)
    - belt                       # новый id 6 (исходный 19)
    - "shirt, blouse"            # новый id 7 (исходный 0)
    - skirt                      # новый id 8 (исходный 8)
    - glasses                    # новый id 9 (исходный 13)
    - "tights, stockings"        # новый id 10 (исходный 21)
  splits:
    test_size: 0.1             # доля train, выделяемая под test (val берётся официальный)
  formats: [yolo, coco]        # форматы экспорта подготовленных данных
  subset_size: null            # null = полный датасет; число = подвыборка (для отладки/диска)
  streaming: false             # потоковая загрузка (для подготовки данных отключается)

# --- Обучение ---
training:
  batch_size: 16               # предварительно
  learning_rate: 0.001         # предварительно
  epochs: 50                   # предварительно
  optimizer: adam              # adam | sgd
  seed: 42                     # фиксация для воспроизводимости
  image_size: 640              # размер входного изображения (предварительно)
  confidence_threshold: 0.25   # порог достоверности предсказаний
  iou_threshold: 0.5           # порог IoU для NMS

# --- Аугментация ---
augmentation:
  horizontal_flip: 0.5         # вероятность горизонтального отражения
  color_jitter: 0.2            # интенсивность цветовых искажений
  random_crop: false           # случайное кадрирование
  mosaic: 0.0                  # mosaic-аугментация (актуальна для YOLO)
